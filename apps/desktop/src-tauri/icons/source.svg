<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="180" y1="120" x2="900" y2="950" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1F27"/>
      <stop offset="1" stop-color="#0B0D12"/>
    </linearGradient>
    <linearGradient id="pipe" x1="330" y1="300" x2="640" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="pipe2" x1="470" y1="320" x2="720" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#tile)"/>
  <rect x="80.5" y="80.5" width="863" height="863" rx="208" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="3"/>

  <!-- Stem: full-height left pipe -->
  <rect x="340" y="296" width="112" height="484" rx="56" fill="url(#pipe)"/>
  <!-- Bowl: pipe segment forming the P loop, with a small junction gap from the stem -->
  <path d="M476 350 H558 A154 154 0 0 1 558 628 H476" fill="none" stroke="url(#pipe2)" stroke-width="112" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pipe segment joints -->
  <rect x="336" y="470" width="120" height="16" rx="8" fill="#0B0D12" opacity="0.9"/>
  <rect x="336" y="624" width="120" height="16" rx="8" fill="#0B0D12" opacity="0.9"/>
</svg>
